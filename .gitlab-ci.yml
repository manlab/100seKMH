# 백세한방병원 — GitLab CI (검증 게이트)
# ───────────────────────────────────────────────────────────────
# 러너: gitlab.threecall.com `mac-studio-m4` (darwin/arm64, shell executor)
#   - `image:` 는 무시됨 → host 도구(node/npm)를 직접 사용
#   - 모노레포: Next.js 앱은 apps/web 하위
# 배포(CD)는 Vercel 이 GitHub push 를 보고 처리 → 여기서는 CI 검증만 수행.
# build 스크립트(`drizzle-kit migrate && next build`)는 DB 가 필요하므로,
# CI 에서는 migrate 를 건너뛰고 `next build` 만 직접 호출한다.

stages:
  - verify

variables:
  NEXT_TELEMETRY_DISABLED: "1"
  GIT_DEPTH: "20"

verify:
  stage: verify
  before_script:
    # nvm 이 있으면 로드 (없으면 무시) + 흔한 node 설치 경로를 PATH 앞에 추가
    - export NVM_DIR="${NVM_DIR:-$HOME/.nvm}"
    - '[ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" || true'
    - export PATH="/opt/homebrew/bin:/usr/local/bin:$NVM_DIR/versions/node/$(ls -1 "$NVM_DIR/versions/node" 2>/dev/null | tail -1)/bin:$PATH"
    - 'echo "node: $(node --version)  npm: $(npm --version)"'
    - cd apps/web
    - npm ci --no-audit --no-fund
  script:
    - echo "▶ 1/3  ESLint"
    - CI=true npx next lint
    - echo "▶ 2/3  Type-check (tsc --noEmit)"
    - npx tsc --noEmit
    - echo "▶ 3/3  Next.js build (drizzle migrate 우회)"
    - npx next build
  artifacts:
    name: "next-build-$CI_COMMIT_SHORT_SHA"
    when: on_failure
    paths:
      - apps/web/.next/
    expire_in: 3 days
  rules:
    # MR: apps/web 변경 시에만 검증
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - apps/web/**/*
        - .gitlab-ci.yml
    # 기본 브랜치(main) push: 항상 검증
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  interruptible: true
